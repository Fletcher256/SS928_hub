<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SS928 小车仿真可视化</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d9dee7;
      --text: #1f2937;
      --muted: #667085;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --canvas: #eef2f7;
      --track: #dfe7ef;
      --ink: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .status-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f9fafb;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .pill strong {
      color: var(--text);
      margin-left: 5px;
      font-weight: 650;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 390px;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .stage {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(360px, 1fr) auto;
      gap: 10px;
    }

    .toolbar,
    .panel,
    .readout {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px;
      min-height: 54px;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .btn {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      padding: 6px 10px;
      cursor: pointer;
    }

    .btn:hover {
      border-color: #aab4c3;
      background: #f8fafc;
    }

    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .btn.danger {
      border-color: var(--red);
      background: var(--red);
      color: #ffffff;
    }

    .btn.good {
      border-color: var(--green);
      background: var(--green);
      color: #ffffff;
    }

    .btn.compact {
      width: 34px;
      padding: 0;
      font-weight: 700;
    }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      background: var(--canvas);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 360px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      left: 10px;
      top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(130px, auto));
      gap: 6px;
      pointer-events: none;
    }

    .hud-item {
      padding: 6px 8px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(217, 222, 231, 0.9);
      border-radius: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .hud-item strong {
      color: var(--text);
      font-weight: 650;
    }

    .readout {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0;
      overflow: hidden;
    }

    .metric {
      min-height: 62px;
      padding: 10px;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      margin-top: 4px;
      color: var(--text);
      font-size: 18px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(170px, 1fr);
      gap: 10px;
      min-height: 0;
    }

    .panel {
      padding: 12px;
      min-width: 0;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 1.2;
    }

    .command-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .field,
    .select {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 8px;
      background: #ffffff;
      color: var(--text);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    label strong {
      color: var(--text);
      font-weight: 600;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 52px;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    .log {
      height: 100%;
      min-height: 170px;
      overflow: auto;
      background: #0f172a;
      color: #dbeafe;
      border-radius: 6px;
      padding: 9px;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .swatch {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .swatch.path {
      background: var(--blue);
    }

    .swatch.target {
      background: var(--amber);
    }

    .swatch.car {
      background: var(--green);
    }

  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>SS928 小车控制仿真</h1>
        <p>命令解析、状态机、直行保持、定距行驶和转向的离线动画</p>
      </div>
      <div class="status-strip">
        <span class="pill">模式 <strong id="pillMode">IDLE</strong></span>
        <span class="pill">自动步骤 <strong id="pillAuto">IDLE</strong></span>
        <span class="pill">运行 <strong id="pillRun">暂停</strong></span>
      </div>
    </header>

    <section class="workspace">
      <section class="stage">
        <div class="toolbar">
          <div class="toolbar-group">
            <button class="btn primary" id="runBtn">运行</button>
            <button class="btn" id="stepBtn">单步</button>
            <button class="btn" id="resetBtn">复位</button>
            <button class="btn danger" data-command="@RC_STOP">急停</button>
          </div>
          <div class="toolbar-group">
            <button class="btn good" data-command="@RC_STR">直行</button>
            <button class="btn" data-command="@RC_AUTO">自动路线</button>
            <button class="btn compact" id="speedDown">-</button>
            <button class="btn compact" id="speedUp">+</button>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="stageCanvas"></canvas>
          <div class="hud">
            <div class="hud-item"><span class="swatch car"></span>小车 <strong id="hudCar">0.0, 0.0</strong></div>
            <div class="hud-item"><span class="swatch path"></span>轨迹 <strong id="hudPath">0 点</strong></div>
            <div class="hud-item"><span class="swatch target"></span>目标 <strong id="hudTarget">无</strong></div>
            <div class="hud-item">串口 <strong>@COMMAND\r\n</strong></div>
          </div>
        </div>

        <div class="readout">
          <div class="metric"><span>Yaw</span><strong id="metricYaw">0.00</strong></div>
          <div class="metric"><span>舵机</span><strong id="metricAngle">90.00</strong></div>
          <div class="metric"><span>速度档</span><strong id="metricSpeed">0</strong></div>
          <div class="metric"><span>里程</span><strong id="metricDistance">0.00</strong></div>
          <div class="metric"><span>横偏</span><strong id="metricX">0.00</strong></div>
          <div class="metric"><span>PID</span><strong id="metricPid">2.50/0.01/0.18</strong></div>
        </div>
      </section>

      <aside class="side">
        <section class="panel">
          <h2>命令</h2>
          <div class="command-row">
            <input class="field" id="commandInput" value="@RC_SPD2" spellcheck="false">
            <button class="btn primary" id="sendBtn">发送</button>
          </div>
          <div class="grid-3" style="margin-top: 8px;">
            <button class="btn" data-command="@RC_SPD1">低速</button>
            <button class="btn" data-command="@RC_SPD2">中速</button>
            <button class="btn" data-command="@RC_SPD3">高速</button>
            <button class="btn" data-command="@RC_DST60">60cm</button>
            <button class="btn" data-command="@RC_YAW90">左转90</button>
            <button class="btn" data-command="@RC_YAW-90">右转90</button>
          </div>
        </section>

        <section class="panel">
          <h2>扰动</h2>
          <div class="grid-2">
            <label>
              <strong>Yaw 漂移 deg/s</strong>
              <div class="range-row">
                <input id="yawDrift" type="range" min="-8" max="8" value="1.2" step="0.1">
                <input class="field" id="yawDriftValue" value="1.2">
              </div>
            </label>
            <label>
              <strong>横向漂移 cm/s</strong>
              <div class="range-row">
                <input id="latDrift" type="range" min="-4" max="4" value="0.3" step="0.1">
                <input class="field" id="latDriftValue" value="0.3">
              </div>
            </label>
          </div>
        </section>

        <section class="panel">
          <h2>PID</h2>
          <div class="grid-3">
            <label><strong>Kp</strong><input class="field" id="kpInput" value="2.50"></label>
            <label><strong>Ki</strong><input class="field" id="kiInput" value="0.01"></label>
            <label><strong>Kd</strong><input class="field" id="kdInput" value="0.18"></label>
          </div>
          <div class="grid-2" style="margin-top: 8px;">
            <button class="btn primary" id="applyPid">应用 PID</button>
            <button class="btn" id="scenarioBtn">跑默认场景</button>
          </div>
        </section>

        <section class="panel">
          <h2>日志</h2>
          <div class="log" id="log"></div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const REMOTE_TIMEOUT_MS = 2000;
    const DISTANCE_TIMEOUT_MS = 30000;
    const TURN_TIMEOUT_MS = 8000;
    const AUTO_DEFAULT_SPEED = 2;
    const AUTO_FORWARD1_CM = 100.0;
    const AUTO_FORWARD2_CM = 60.0;
    const AUTO_TURN_DEG = 90.0;
    const DISTANCE_DONE_CM = 2.0;
    const TURN_DONE_DEG = 3.0;
    const TURN_SERVO_MAX_OFFSET = 35.0;
    const TURN_SERVO_KP = 0.75;
    const SPEEDSTEP = 120;
    const RSPEEDSTEP = 15;

    const Mode = {
      IDLE: "IDLE",
      MANUAL: "MANUAL",
      STRAIGHT: "STRAIGHT",
      DISTANCE: "DISTANCE",
      TURN_YAW: "TURN_YAW",
      AUTO_ROUTE: "AUTO_ROUTE"
    };

    const AutoStep = {
      IDLE: "IDLE",
      FORWARD1: "FORWARD1",
      TURN1: "TURN1",
      FORWARD2: "FORWARD2"
    };

    const RunState = {
      STANDBY: "STANDBY",
      PARKING: "PARKING",
      HITTED: "HITTED"
    };

    function clamp(value, minValue, maxValue) {
      return Math.max(minValue, Math.min(maxValue, value));
    }

    function normalizeYaw(yaw) {
      while (yaw > 180) yaw -= 360;
      while (yaw < -180) yaw += 360;
      return yaw;
    }

    function parseCommandValue(text, scaledHundredths = false) {
      const normalized = String(text).trim().replace(/^[ =:]+|[ =:]+$/g, "");
      const match = normalized.match(/^([+-]?)(\d+)(?:\.(\d+))?$/);
      if (!match) return null;
      const sign = match[1] === "-" ? -1 : 1;
      let value = Number(match[2]);
      if (match[3] !== undefined) {
        value += Number(`0.${match[3]}`);
      } else if (scaledHundredths) {
        value *= 0.01;
      }
      return value * sign;
    }

    class HeadingPid {
      constructor() {
        this.kp = 2.5;
        this.ki = 0.01;
        this.kd = 0.18;
        this.maxI = 5.0;
        this.maxOut = 8.0;
        this.deadband = 2.0;
        this.dAlpha = 0.7;
        this.smoothAlpha = 0.4;
        this.crossTrackKp = 2.0;
        this.crossTrackEnable = true;
        this.integral = 0.0;
        this.lastError = 0.0;
        this.dv = 0.0;
        this.smoothedAngle = 90.0;
        this.firstRun = true;
      }

      reset() {
        this.integral = 0.0;
        this.lastError = 0.0;
        this.dv = 0.0;
        this.smoothedAngle = 90.0;
        this.firstRun = true;
        this.crossTrackEnable = true;
      }
    }

    class Odom {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = 0.0;
        this.y = 0.0;
        this.theta = 0.0;
        this.distance = 0.0;
      }
    }

    class CarSim {
      constructor() {
        this.path = [];
        this.responses = [];
        this.pid = new HeadingPid();
        this.odom = new Odom();
        this.reset();
      }

      reset() {
        this.isUp = 1;
        this.isTurn = false;
        this.isStraight = false;
        this.state = RunState.STANDBY;
        this.angle = 90.0;
        this.newYaw = 0.0;
        this.orgYaw = 0.0;
        this.speedRank = 0;
        this.controlTicks = 0;
        this.lastCommandTick = 0;
        this.actionStartTick = 0;
        this.targetDistanceCm = 0.0;
        this.targetYaw = 0.0;
        this.autoSpeedLevel = AUTO_DEFAULT_SPEED;
        this.mode = Mode.IDLE;
        this.autoStep = AutoStep.IDLE;
        this.pid = new HeadingPid();
        this.odom.reset();
        this.path = [{ x: 0, y: 0, yaw: 0 }];
        this.responses = [];
      }

      reply(text) {
        this.responses.push(text);
      }

      refreshWatchdog() {
        this.lastCommandTick = this.controlTicks;
      }

      centerSteering() {
        this.angle = 90.0;
      }

      hardStopMotion() {
        this.speedRank = 0;
        this.centerSteering();
        this.isStraight = false;
        this.isTurn = false;
        this.autoStep = AutoStep.IDLE;
        this.mode = Mode.IDLE;
      }

      setStandbyMode() {
        this.hardStopMotion();
        this.state = RunState.STANDBY;
      }

      setManualMode() {
        if ([Mode.AUTO_ROUTE, Mode.DISTANCE, Mode.TURN_YAW].includes(this.mode)) {
          this.autoStep = AutoStep.IDLE;
        }
        this.mode = Mode.MANUAL;
        this.isStraight = false;
        this.isTurn = false;
        this.pid.crossTrackEnable = false;
      }

      setManualModeIfIdle() {
        if (this.mode === Mode.IDLE) this.setManualMode();
      }

      setSpeedRank(level) {
        if (level >= 0 && level < 7) {
          this.speedRank = this.isUp * level * SPEEDSTEP;
        }
      }

      speedAcc() {
        let rank = Math.abs(this.speedRank);
        if (rank < 720) {
          rank = Math.min(720, rank + SPEEDSTEP);
          this.speedRank = this.isUp * rank;
        }
      }

      speedSlowDown() {
        let rank = Math.abs(this.speedRank);
        if (rank > 0) {
          rank = Math.max(0, rank - SPEEDSTEP);
          this.speedRank = this.isUp * rank;
        }
      }

      exDirect(forward) {
        this.isUp = forward ? 1 : -1;
        this.speedRank = Math.abs(this.speedRank) * this.isUp;
        this.orgYaw = this.newYaw;
        this.pid.reset();
        this.odom.reset();
        if (this.isStraight) this.pid.crossTrackEnable = true;
      }

      setStraight() {
        this.isStraight = true;
        this.isTurn = false;
        this.orgYaw = this.newYaw;
        this.pid.reset();
        this.pid.crossTrackEnable = true;
        this.odom.reset();
      }

      prepareStraightHold() {
        this.setStraight();
        this.mode = Mode.STRAIGHT;
        this.autoStep = AutoStep.IDLE;
      }

      ensureAutoSpeed() {
        if (this.speedRank === 0) this.setSpeedRank(this.autoSpeedLevel);
      }

      prepareDistanceDrive(distanceCm) {
        if (Math.abs(distanceCm) < 1.0) return false;
        if (distanceCm < 0.0) {
          if (this.isUp === 1) this.exDirect(false);
          this.targetDistanceCm = -distanceCm;
        } else {
          if (this.isUp === -1) this.exDirect(true);
          this.targetDistanceCm = distanceCm;
        }
        this.setStraight();
        this.odom.reset();
        this.actionStartTick = this.controlTicks;
        this.ensureAutoSpeed();
        return true;
      }

      startDistanceDrive(distanceCm) {
        if (this.prepareDistanceDrive(distanceCm)) {
          this.mode = Mode.DISTANCE;
          this.autoStep = AutoStep.IDLE;
          this.reply(`Distance drive ${this.targetDistanceCm.toFixed(1)} cm`);
        } else {
          this.reply("Invalid distance target!");
        }
      }

      prepareYawTurn(relativeYawDeg) {
        if (Math.abs(relativeYawDeg) < TURN_DONE_DEG) return false;
        this.targetYaw = normalizeYaw(this.newYaw + relativeYawDeg);
        this.isStraight = false;
        this.isTurn = true;
        this.pid.crossTrackEnable = false;
        this.actionStartTick = this.controlTicks;
        this.ensureAutoSpeed();
        return true;
      }

      startYawTurn(relativeYawDeg) {
        if (this.prepareYawTurn(relativeYawDeg)) {
          this.mode = Mode.TURN_YAW;
          this.autoStep = AutoStep.IDLE;
          this.reply(`Yaw turn ${relativeYawDeg.toFixed(1)} deg`);
        } else {
          this.reply("Invalid yaw target!");
        }
      }

      startAutoRoute() {
        this.state = RunState.PARKING;
        this.autoSpeedLevel = AUTO_DEFAULT_SPEED;
        this.mode = Mode.AUTO_ROUTE;
        this.autoStep = AutoStep.FORWARD1;
        if (this.prepareDistanceDrive(AUTO_FORWARD1_CM)) {
          this.reply("Auto route start");
        } else {
          this.setStandbyMode();
          this.reply("Auto route failed");
        }
      }

      updateDistanceDrive() {
        return this.targetDistanceCm <= 0.0 ||
          (this.targetDistanceCm - this.odom.distance) <= DISTANCE_DONE_CM;
      }

      updateYawTurn() {
        const error = normalizeYaw(this.targetYaw - this.newYaw);
        if (Math.abs(error) <= TURN_DONE_DEG) {
          this.speedRank = 0;
          this.centerSteering();
          this.isTurn = false;
          return true;
        }
        let correction = clamp(error * TURN_SERVO_KP, -TURN_SERVO_MAX_OFFSET, TURN_SERVO_MAX_OFFSET);
        if (this.isUp === -1) correction = -correction;
        this.angle = clamp(90.0 + correction, 0.0, 180.0);
        this.ensureAutoSpeed();
        return false;
      }

      updateControlTask() {
        if ([Mode.MANUAL, Mode.STRAIGHT].includes(this.mode) &&
            this.speedRank !== 0 &&
            this.controlTicks - this.lastCommandTick > REMOTE_TIMEOUT_MS) {
          this.setStandbyMode();
          this.reply("Remote timeout stop!");
          return;
        }

        const inDistanceAction = this.mode === Mode.DISTANCE ||
          (this.mode === Mode.AUTO_ROUTE && [AutoStep.FORWARD1, AutoStep.FORWARD2].includes(this.autoStep));
        if (inDistanceAction && this.controlTicks - this.actionStartTick > DISTANCE_TIMEOUT_MS) {
          this.setStandbyMode();
          this.reply("Distance timeout stop!");
          return;
        }

        const inTurnAction = this.mode === Mode.TURN_YAW ||
          (this.mode === Mode.AUTO_ROUTE && this.autoStep === AutoStep.TURN1);
        if (inTurnAction && this.controlTicks - this.actionStartTick > TURN_TIMEOUT_MS) {
          this.setStandbyMode();
          this.reply("Turn timeout stop!");
          return;
        }

        if (this.mode === Mode.DISTANCE) {
          if (this.updateDistanceDrive()) {
            this.setStandbyMode();
            this.reply("Distance done");
          }
        } else if (this.mode === Mode.TURN_YAW) {
          if (this.updateYawTurn()) {
            this.setStandbyMode();
            this.reply("Yaw turn done");
          }
        } else if (this.mode === Mode.AUTO_ROUTE) {
          if (this.autoStep === AutoStep.FORWARD1 && this.updateDistanceDrive()) {
            this.speedRank = 0;
            if (this.prepareYawTurn(AUTO_TURN_DEG)) {
              this.autoStep = AutoStep.TURN1;
            } else {
              this.setStandbyMode();
              this.reply("Auto turn failed");
            }
          } else if (this.autoStep === AutoStep.TURN1 && this.updateYawTurn()) {
            if (this.prepareDistanceDrive(AUTO_FORWARD2_CM)) {
              this.autoStep = AutoStep.FORWARD2;
            } else {
              this.setStandbyMode();
              this.reply("Auto forward failed");
            }
          } else if (this.autoStep === AutoStep.FORWARD2 && this.updateDistanceDrive()) {
            this.setStandbyMode();
            this.state = RunState.PARKING;
            this.reply("Auto route done");
          }
        }
      }

      keepStraight() {
        let error = this.orgYaw - this.newYaw;
        if (error > 180.0) error -= 360.0;
        if (error < -180.0) error += 360.0;
        if (Math.abs(error) < this.pid.deadband) error = 0.0;

        const pOut = this.pid.kp * error;
        if (Math.abs(error) < 8.0 && Math.abs(error) > 0.0) {
          this.pid.integral += this.pid.ki * error;
        } else if (Math.abs(error) >= 8.0) {
          this.pid.integral *= 0.95;
        }
        this.pid.integral = clamp(this.pid.integral, -this.pid.maxI, this.pid.maxI);

        if (this.pid.firstRun) {
          this.pid.lastError = error;
          this.pid.firstRun = false;
        }
        const dError = error - this.pid.lastError;
        this.pid.dv = (1.0 - this.pid.dAlpha) * dError * this.pid.kd + this.pid.dAlpha * this.pid.dv;
        this.pid.lastError = error;

        let correction = pOut + this.pid.integral + this.pid.dv;
        if (this.isUp === -1) correction = -correction;
        if (this.pid.crossTrackEnable) {
          let crossCorrection = this.pid.crossTrackKp * this.odom.x;
          if (this.isUp === -1) crossCorrection = -crossCorrection;
          correction += crossCorrection;
        }
        correction = clamp(correction, -this.pid.maxOut, this.pid.maxOut);
        const targetAngle = 90.0 + correction;
        this.pid.smoothedAngle =
          this.pid.smoothAlpha * targetAngle + (1.0 - this.pid.smoothAlpha) * this.pid.smoothedAngle;
        this.angle = this.pid.smoothedAngle;
      }

      handleCommand(rawCommand) {
        let command = String(rawCommand).trim();
        if (command.startsWith("@")) command = command.slice(1);
        this.refreshWatchdog();

        if (command === "RC_HB") {
          this.reply("OK");
        } else if (command === "RC_STOP" || command === "AU_STOP") {
          this.reply("Stop!");
          this.setStandbyMode();
        } else if (command === "RC_MAN") {
          this.setManualMode();
          this.reply("Manual mode");
        } else if (command === "RC_STR") {
          this.prepareStraightHold();
          this.reply("Straight hold mode");
        } else if (command === "RC_AUTO" || command === "AU_RUN" || command === "ST_PK") {
          if (command === "ST_PK") this.reply("Parking auto!");
          this.startAutoRoute();
        } else if (command.startsWith("RC_DST")) {
          const value = parseCommandValue(command.slice(6));
          value === null ? this.reply("Invalid distance value!") : this.startDistanceDrive(value);
        } else if (command.startsWith("RC_YAW")) {
          const value = parseCommandValue(command.slice(6));
          value === null ? this.reply("Invalid yaw value!") : this.startYawTurn(value);
        } else if (command.startsWith("RC_SPD")) {
          const value = parseCommandValue(command.slice(6));
          if (value === null || value < 0 || value > 6) {
            this.reply("Invalid speed rank!");
          } else {
            if ([Mode.AUTO_ROUTE, Mode.DISTANCE, Mode.TURN_YAW].includes(this.mode)) this.setManualMode();
            this.setManualModeIfIdle();
            this.setSpeedRank(Math.trunc(value));
            this.reply(`SET ${this.speedRank} Rank!`);
          }
        } else if (command.startsWith("RC_STE")) {
          const value = parseCommandValue(command.slice(6));
          if (value === null) {
            this.reply("Invalid servo value!");
          } else {
            this.setManualMode();
            this.angle = clamp(value, 0, 180);
            this.reply(`Servo to ${this.angle.toFixed(6)} deg!`);
          }
        } else if (command === "DT_1") {
          this.setManualMode();
          this.reply("Up!");
          if (this.isUp === -1) this.exDirect(true);
        } else if (command === "DT_0") {
          this.setManualMode();
          this.reply("Down!");
          if (this.isUp === 1) this.exDirect(false);
        } else if (command === "DT_STA") {
          this.reply("Straight!");
          this.prepareStraightHold();
        } else if (command === "DT_TUR") {
          this.setManualMode();
          this.isTurn = true;
          this.reply("Turn manual mode!");
        } else if (command === "SR_ACC") {
          if ([Mode.AUTO_ROUTE, Mode.DISTANCE, Mode.TURN_YAW].includes(this.mode)) this.setManualMode();
          this.setManualModeIfIdle();
          this.reply("SpeedRank add!");
          this.speedAcc();
        } else if (command === "SR_DEC") {
          if ([Mode.AUTO_ROUTE, Mode.DISTANCE, Mode.TURN_YAW].includes(this.mode)) this.setManualMode();
          this.setManualModeIfIdle();
          this.reply("SpeedRank decline!");
          this.speedSlowDown();
        } else if (command === "SR_PAU") {
          this.setManualMode();
          this.reply("SpeedRank stop!");
          this.speedRank = 0;
        } else if (command.startsWith("SR_SET")) {
          const digit = command[6];
          if (digit >= "0" && digit <= "6") {
            if ([Mode.AUTO_ROUTE, Mode.DISTANCE, Mode.TURN_YAW].includes(this.mode)) this.setManualMode();
            this.setManualModeIfIdle();
            this.setSpeedRank(Number(digit));
            this.reply(`SET ${this.speedRank} Rank!`);
          } else {
            this.reply("Invalid speed rank!");
          }
        } else if (command.startsWith("ST_K") && command.length >= 5) {
          const value = parseCommandValue(command.slice(5), true);
          const axis = command[4];
          if (!"PID".includes(axis) || value === null) {
            this.reply("Invalid heading PID value!");
          } else if (axis === "P") {
            this.pid.kp = value;
            this.reply(`Set heading Kp to ${this.pid.kp.toFixed(6)}!`);
          } else if (axis === "I") {
            this.pid.ki = value;
            this.reply(`Set heading Ki to ${this.pid.ki.toFixed(6)}!`);
          } else if (axis === "D") {
            this.pid.kd = value;
            this.reply(`Set heading Kd to ${this.pid.kd.toFixed(6)}!`);
          }
        } else if (command.startsWith("RT_TO")) {
          const value = parseCommandValue(command.slice(5));
          if (value === null) {
            this.reply("Invalid rotate value!");
          } else {
            this.setManualMode();
            this.angle = clamp(180 - value, 0, 180);
            this.reply(`Rotate to ${this.angle.toFixed(6)} deg!`);
          }
        } else if (command === "ST_SB") {
          this.reply("Stand by!");
          this.setStandbyMode();
        } else if (command === "ST_ER") {
          this.reply("Hitted!");
          this.setStandbyMode();
          this.state = RunState.HITTED;
        } else {
          this.reply("Unknown command!");
        }
      }

      plantStep(dtMs, yawDriftDps, lateralDriftCms) {
        const dt = dtMs / 1000;
        const level = Math.abs(this.speedRank) / SPEEDSTEP;
        const speedCms = level * RSPEEDSTEP;
        const direction = this.speedRank >= 0 ? 1 : -1;

        if (this.speedRank !== 0) {
          this.odom.distance += speedCms * dt;
          this.odom.y += direction * speedCms * dt;
        }

        if (this.isStraight && this.speedRank !== 0) {
          const correctionEffect = (this.angle - 90) * 0.18;
          this.newYaw = normalizeYaw(this.newYaw + (yawDriftDps + correctionEffect) * dt);
          this.odom.x += (lateralDriftCms - (this.angle - 90) * 0.04) * dt;
        }

        if (this.isTurn && this.speedRank !== 0) {
          const yawRate = (this.angle - 90) * 1.5 * direction;
          this.newYaw = normalizeYaw(this.newYaw + yawRate * dt);
        }

        const last = this.path[this.path.length - 1];
        const shouldPush = !last ||
          Math.hypot(last.x - this.odom.x, last.y - this.odom.y) > 0.5 ||
          this.path.length < 2;
        if (shouldPush) {
          this.path.push({ x: this.odom.x, y: this.odom.y, yaw: this.newYaw });
          if (this.path.length > 2400) this.path.shift();
        }
      }

      tick(ms, plant, yawDriftDps, lateralDriftCms) {
        let remaining = ms;
        let straightAccum = 0;
        while (remaining > 0) {
          const dt = Math.min(remaining, 10);
          this.controlTicks += dt;
          straightAccum += dt;
          if (plant) this.plantStep(dt, yawDriftDps, lateralDriftCms);
          if (this.isStraight && straightAccum >= 20) {
            straightAccum = 0;
            this.keepStraight();
          }
          this.updateControlTask();
          remaining -= dt;
        }
      }
    }

    const sim = new CarSim();
    let running = false;
    let lastFrame = performance.now();

    const canvas = document.getElementById("stageCanvas");
    const ctx = canvas.getContext("2d");
    const logEl = document.getElementById("log");
    const commandInput = document.getElementById("commandInput");
    const yawDrift = document.getElementById("yawDrift");
    const latDrift = document.getElementById("latDrift");
    const yawDriftValue = document.getElementById("yawDriftValue");
    const latDriftValue = document.getElementById("latDriftValue");

    function valueNumber(el, fallback) {
      const n = Number(el.value);
      return Number.isFinite(n) ? n : fallback;
    }

    function log(text) {
      const time = (sim.controlTicks / 1000).toFixed(2).padStart(6, " ");
      logEl.textContent += `[${time}s] ${text}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function flushResponses() {
      while (sim.responses.length) {
        log(`uart: ${sim.responses.shift()}`);
      }
    }

    function sendCommand(command) {
      if (!command) return;
      sim.handleCommand(command);
      log(`tx: ${command}`);
      flushResponses();
      updateUi();
      draw();
    }

    function syncRange(rangeEl, valueEl) {
      rangeEl.addEventListener("input", () => {
        valueEl.value = rangeEl.value;
      });
      valueEl.addEventListener("change", () => {
        const min = Number(rangeEl.min);
        const max = Number(rangeEl.max);
        const value = clamp(valueNumber(valueEl, Number(rangeEl.value)), min, max);
        rangeEl.value = String(value);
        valueEl.value = String(value);
      });
    }

    function runDefaultScenario() {
      sim.reset();
      logEl.textContent = "";
      log("scenario start");
      running = true;
      updateUi();
      draw();

      const commands = [
        [0, "@RC_SPD2"],
        [250, "@RC_STR"],
        [500, "@ST_KP1.20"],
        [700, "@ST_KI0.02"],
        [900, "@ST_KD0.30"],
        [1200, "@RC_DST60"],
        [4300, "@RC_YAW90"],
        [8300, "@RC_AUTO"]
      ];
      for (const [delay, command] of commands) {
        window.setTimeout(() => {
          sendCommand(command);
        }, delay);
      }
    }

    function updateUi() {
      document.getElementById("pillMode").textContent = sim.mode;
      document.getElementById("pillAuto").textContent = sim.autoStep;
      document.getElementById("pillRun").textContent = running ? "运行" : "暂停";
      document.getElementById("runBtn").textContent = running ? "暂停" : "运行";

      document.getElementById("metricYaw").textContent = sim.newYaw.toFixed(2);
      document.getElementById("metricAngle").textContent = sim.angle.toFixed(2);
      document.getElementById("metricSpeed").textContent = String(sim.speedRank);
      document.getElementById("metricDistance").textContent = sim.odom.distance.toFixed(2);
      document.getElementById("metricX").textContent = sim.odom.x.toFixed(2);
      document.getElementById("metricPid").textContent =
        `${sim.pid.kp.toFixed(2)}/${sim.pid.ki.toFixed(2)}/${sim.pid.kd.toFixed(2)}`;
      document.getElementById("hudCar").textContent = `${sim.odom.x.toFixed(1)}, ${sim.odom.y.toFixed(1)}`;
      document.getElementById("hudPath").textContent = `${sim.path.length} 点`;
      const target = sim.mode === Mode.DISTANCE || (sim.mode === Mode.AUTO_ROUTE && sim.autoStep !== AutoStep.TURN1)
        ? `${sim.targetDistanceCm.toFixed(0)}cm`
        : (sim.mode === Mode.TURN_YAW || (sim.mode === Mode.AUTO_ROUTE && sim.autoStep === AutoStep.TURN1)
          ? `${sim.targetYaw.toFixed(0)}deg`
          : "无");
      document.getElementById("hudTarget").textContent = target;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.max(300, Math.floor(rect.width * dpr));
      const height = Math.max(300, Math.floor(rect.height * dpr));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
    }

    function worldToScreen(point, bounds, w, h) {
      const pad = 52;
      const sx = (w - pad * 2) / Math.max(1, bounds.maxX - bounds.minX);
      const sy = (h - pad * 2) / Math.max(1, bounds.maxY - bounds.minY);
      const scale = Math.min(sx, sy);
      const cx = (bounds.minX + bounds.maxX) * 0.5;
      const cy = (bounds.minY + bounds.maxY) * 0.5;
      return {
        x: w * 0.5 + (point.x - cx) * scale,
        y: h * 0.5 - (point.y - cy) * scale,
        scale
      };
    }

    function drawGrid(w, h) {
      ctx.fillStyle = "#eef2f7";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#d8e0ea";
      ctx.lineWidth = 1;
      const step = 40;
      for (let x = 0; x <= w; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }
    }

    function drawCar(screen, yawDeg, scale) {
      const yaw = -yawDeg * Math.PI / 180;
      const bodyW = Math.max(20, 14 * scale);
      const bodyH = Math.max(30, 22 * scale);
      ctx.save();
      ctx.translate(screen.x, screen.y);
      ctx.rotate(yaw);
      ctx.fillStyle = "#16a34a";
      ctx.strokeStyle = "#14532d";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(-bodyW * 0.5, -bodyH * 0.5, bodyW, bodyH, 5);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#dcfce7";
      ctx.beginPath();
      ctx.moveTo(0, -bodyH * 0.58);
      ctx.lineTo(bodyW * 0.38, -bodyH * 0.18);
      ctx.lineTo(-bodyW * 0.38, -bodyH * 0.18);
      ctx.closePath();
      ctx.fill();

      const wheelW = Math.max(5, bodyW * 0.22);
      const wheelH = Math.max(8, bodyH * 0.22);
      ctx.fillStyle = "#111827";
      for (const wx of [-bodyW * 0.62, bodyW * 0.62]) {
        for (const wy of [-bodyH * 0.3, bodyH * 0.3]) {
          ctx.fillRect(wx - wheelW * 0.5, wy - wheelH * 0.5, wheelW, wheelH);
        }
      }

      ctx.rotate((sim.angle - 90) * Math.PI / 180);
      ctx.strokeStyle = "#fde68a";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, -bodyH * 0.16);
      ctx.lineTo(0, -bodyH * 0.78);
      ctx.stroke();
      ctx.restore();
    }

    function draw() {
      resizeCanvas();
      const w = canvas.width;
      const h = canvas.height;
      drawGrid(w, h);

      const points = sim.path.length ? sim.path : [{ x: 0, y: 0 }];
      const xs = points.map(p => p.x).concat([sim.odom.x, 0]);
      const ys = points.map(p => p.y).concat([sim.odom.y, 0, 120]);
      const bounds = {
        minX: Math.min(...xs, -35),
        maxX: Math.max(...xs, 35),
        minY: Math.min(...ys, -20),
        maxY: Math.max(...ys, 120)
      };

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#cbd5e1";
      ctx.lineWidth = 2;
      const origin = worldToScreen({ x: 0, y: 0 }, bounds, w, h);
      const forward = worldToScreen({ x: 0, y: 120 }, bounds, w, h);
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y);
      ctx.lineTo(forward.x, forward.y);
      ctx.stroke();

      if (points.length > 1) {
        ctx.strokeStyle = "#2563eb";
        ctx.lineWidth = 3;
        ctx.beginPath();
        points.forEach((p, index) => {
          const s = worldToScreen(p, bounds, w, h);
          if (index === 0) ctx.moveTo(s.x, s.y);
          else ctx.lineTo(s.x, s.y);
        });
        ctx.stroke();
      }

      const targetY = (sim.mode === Mode.DISTANCE || sim.mode === Mode.AUTO_ROUTE)
        ? sim.targetDistanceCm
        : null;
      if (targetY !== null && sim.autoStep !== AutoStep.TURN1) {
        const a = worldToScreen({ x: -26, y: targetY }, bounds, w, h);
        const b = worldToScreen({ x: 26, y: targetY }, bounds, w, h);
        ctx.strokeStyle = "#d97706";
        ctx.lineWidth = 2;
        ctx.setLineDash([7, 6]);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      const carScreen = worldToScreen({ x: sim.odom.x, y: sim.odom.y }, bounds, w, h);
      drawCar(carScreen, sim.newYaw, carScreen.scale);
    }

    function frame(now) {
      const elapsed = Math.min(80, now - lastFrame);
      lastFrame = now;
      if (running) {
        sim.tick(elapsed, true, valueNumber(yawDrift, 0), valueNumber(latDrift, 0));
        flushResponses();
        updateUi();
      }
      draw();
      requestAnimationFrame(frame);
    }

    document.querySelectorAll("[data-command]").forEach(button => {
      button.addEventListener("click", () => sendCommand(button.dataset.command));
    });

    document.getElementById("sendBtn").addEventListener("click", () => {
      sendCommand(commandInput.value);
    });

    commandInput.addEventListener("keydown", event => {
      if (event.key === "Enter") sendCommand(commandInput.value);
    });

    document.getElementById("runBtn").addEventListener("click", () => {
      running = !running;
      updateUi();
    });

    document.getElementById("stepBtn").addEventListener("click", () => {
      sim.tick(100, true, valueNumber(yawDrift, 0), valueNumber(latDrift, 0));
      flushResponses();
      updateUi();
      draw();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      sim.reset();
      logEl.textContent = "";
      log("reset");
      updateUi();
      draw();
    });

    document.getElementById("speedUp").addEventListener("click", () => sendCommand("@SR_ACC"));
    document.getElementById("speedDown").addEventListener("click", () => sendCommand("@SR_DEC"));

    document.getElementById("applyPid").addEventListener("click", () => {
      const kp = valueNumber(document.getElementById("kpInput"), sim.pid.kp);
      const ki = valueNumber(document.getElementById("kiInput"), sim.pid.ki);
      const kd = valueNumber(document.getElementById("kdInput"), sim.pid.kd);
      sendCommand(`@ST_KP${kp.toFixed(2)}`);
      sendCommand(`@ST_KI${ki.toFixed(2)}`);
      sendCommand(`@ST_KD${kd.toFixed(2)}`);
    });

    document.getElementById("scenarioBtn").addEventListener("click", runDefaultScenario);

    syncRange(yawDrift, yawDriftValue);
    syncRange(latDrift, latDriftValue);
    window.addEventListener("resize", draw);

    log("visualizer ready");
    updateUi();
    draw();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
